name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & syntax check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile all .py files (syntax check)
        run: python -m compileall . -q -x ".venv|versions"

  smoke-tests:
    name: Smoke tests (isolated)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run isolated smoke tests
        shell: bash
        run: |
          failed=0
          # Run smoke tests that don't need a running LLM server or hardware
          for test in scripts/*_smoke_test.py; do
            echo "::group::$(basename "$test")"
            if python "$test"; then
              echo "PASS: $test"
            else
              echo "::error::FAIL: $test"
              failed=$((failed + 1))
            fi
            echo "::endgroup::"
          done
          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed smoke test(s) failed"
            exit 1
          fi
